version: "3.9"

services:
  # ══ SHARED INFRASTRUCTURE ══════════════════════════════

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "0.0.0.0:5432:5432"
    environment:
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: hackathon2025
      POSTGRES_DB: memory_benchmark
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackathon"]
      interval: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "0.0.0.0:6333:6333"
      - "0.0.0.0:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      default:
        aliases:
          - mem0_store

  neo4j:
    image: neo4j:5-community
    ports:
      - "0.0.0.0:7474:7474"
      - "0.0.0.0:7687:7687"
    environment:
      NEO4J_AUTH: neo4j/hackathon2025
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:7474 -O /dev/null"]
      interval: 10s
      retries: 10
      start_period: 30s

  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "0.0.0.0:4000:4000"
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /credentials/gcp-sa.json
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
      - ./credentials/gcp-sa.json:/credentials/gcp-sa.json:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:4000/health -O /dev/null || exit 1"]
      interval: 10s
      retries: 6
      start_period: 20s

  # ══ MEMORY SYSTEM 1: Mem0 (OpenMemory MCP) ══════════════

  mem0-mcp:
    image: mem0/openmemory-mcp
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8765", "--workers", "15"]
    ports:
      - "0.0.0.0:8181:8765"
    environment:
      USER: hackathon
      LLM_PROVIDER: openai
      LLM_MODEL: gemini-flash
      LLM_API_KEY: dummy
      LLM_BASE_URL: http://litellm-proxy:4000
      EMBEDDER_PROVIDER: vertexai
      GOOGLE_APPLICATION_CREDENTIALS: /credentials/gcp-sa.json
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: dummy
      OPENAI_BASE_URL: http://litellm-proxy:4000
    volumes:
      - ./credentials/gcp-sa.json:/credentials/gcp-sa.json:ro
      - mem0_db:/usr/src/openmemory
    depends_on:
      - qdrant
      - litellm-proxy

  # ══ MEMORY SYSTEM 2: Graphiti MCP (Neo4j + Anthropic/Gemini) ══════

  graphiti-mcp:
    image: zepai/knowledge-graph-mcp:latest
    ports:
      - "0.0.0.0:8050:8000"
    environment:
      OPENAI_API_KEY: sk-not-needed
      SEMAPHORE_LIMIT: "10"
      CONFIG_PATH: /app/mcp/config/config.yaml
    volumes:
      - ./graphiti-config.yaml:/app/mcp/config/config.yaml:ro
    depends_on:
      neo4j:
        condition: service_healthy
      litellm-proxy:
        condition: service_started

  # ══ MEMORY SYSTEM 3: Cognee MCP ═════════════════════════

  cognee-mcp:
    image: cognee/cognee-mcp:main
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      TRANSPORT_MODE: sse
      LLM_PROVIDER: anthropic
      LLM_MODEL: claude-3-5-haiku-20241022
      LLM_API_KEY: ${ANTHROPIC_API_KEY}
      EMBEDDING_PROVIDER: gemini
      EMBEDDING_MODEL: "gemini/text-embedding-004"
      EMBEDDING_DIMENSIONS: "768"
      EMBEDDING_API_KEY: ${GOOGLE_API_KEY}
      EMBEDDING_ENDPOINT: "https://generativelanguage.googleapis.com/v1beta/models/text-embedding-004"
      EMBEDDING_API_VERSION: "v1beta"
      DB_PROVIDER: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: cognee
      DB_USERNAME: hackathon
      DB_PASSWORD: hackathon2025
      TELEMETRY_DISABLED: "true"
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy

  # ══ FILE SERVER ══════════════════════════════════════════

  fileserver:
    image: halverneus/static-file-server:latest
    ports:
      - "0.0.0.0:9000:8080"
    volumes:
      - ./shared-data:/web
    environment:
      FOLDER: /web

volumes:
  pg_data:
  qdrant_data:
  neo4j_data:
  mem0_db:
